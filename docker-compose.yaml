services:
  bantukos-wa-bot:
    build: .
    restart: unless-stopped
    volumes:
      # Session WA dan data persistent
      - ./data:/app/data
      # Baca listing dari bantukos-bot (read-only)
      - /data/bantukos/bantukos.db:/app/data/bantukos.db:ro
      # Docker socket untuk owner bersihkan command
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
